    - "unrealtournament.com"
    - "*.unrealtournament.com"
    # Creative & marketplace
    - "artstation.com"
    - "*.artstation.com"
    - "sketchfab.com"
    - "*.sketchfab.com"
    - "quixel.com"
    - "*.quixel.com"
    - "fab.com"
    - "*.fab.com"
    - "capturingreality.com"
    - "*.capturingreality.com"
    - "twinmotion.com"
