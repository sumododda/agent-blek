notes: |
  Bugcrowd program for Marriott International.
  Large attack surface: 70+ explicit domains plus wildcard patterns.
  Key targets include SSO, reservation systems, employee password reset,
  gateway/API infrastructure, UAT environments, and luxury brand sites.
  passwordchallenge.marriott.com handles employee password resets - high value.
  *uat.marriott.com are user acceptance testing environments.
  iOS app (App Store ID 455004730) also in scope but not testable via CLI.
  Conservative rate limiting (5 rps) - large enterprise, be respectful.
