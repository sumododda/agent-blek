services:
  juiceshop:
    image: bkimminich/juice-shop:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=unsafe
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s

  tools:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../data/output:/home/scanner/output
    network_mode: host
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /home/scanner/.config
    depends_on:
      juiceshop:
        condition: service_healthy
